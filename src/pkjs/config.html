<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Naos Watchface</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      max-width: 320px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      color: #333;
      font-size: 20px;
      margin-bottom: 20px;
    }
    h2 {
      font-size: 14px;
      color: #666;
      margin: 16px 0 8px 0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .theme-list, .option-list {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin-bottom: 16px;
    }
    .theme-option, .option-item {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      cursor: pointer;
      border-bottom: 1px solid #eee;
      transition: background 0.2s;
    }
    .theme-option:last-child, .option-item:last-child {
      border-bottom: none;
    }
    .theme-option:hover, .option-item:hover {
      background: #f9f9f9;
    }
    .theme-option input[type="radio"], .option-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      margin-right: 12px;
      cursor: pointer;
    }
    .theme-info, .option-info {
      flex: 1;
    }
    .theme-name, .option-name {
      font-weight: 600;
      color: #333;
      margin-bottom: 2px;
    }
    .theme-desc, .option-desc {
      font-size: 12px;
      color: #666;
    }
    .theme-preview {
      display: flex;
      gap: 6px;
    }
    .color-dot {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid #ddd;
    }
    .btn-save {
      width: 100%;
      padding: 16px;
      background: #0000aa;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn-save:active {
      background: #000088;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Naos Watchface</h1>
    
    <h2>Theme</h2>
    <div class="theme-list">
      <label class="theme-option">
        <input type="radio" name="theme" value="0" checked>
        <div class="theme-info">
          <div class="theme-name">Classic</div>
          <div class="theme-desc">White dial, blue hands</div>
        </div>
        <div class="theme-preview">
          <div class="color-dot" style="background: #ffffff;"></div>
          <div class="color-dot" style="background: #0000aa;"></div>
        </div>
      </label>
      
      <label class="theme-option">
        <input type="radio" name="theme" value="1">
        <div class="theme-info">
          <div class="theme-name">Black</div>
          <div class="theme-desc">Black dial, white hands</div>
        </div>
        <div class="theme-preview">
          <div class="color-dot" style="background: #000000;"></div>
          <div class="color-dot" style="background: #ffffff;"></div>
        </div>
      </label>
      
      <label class="theme-option">
        <input type="radio" name="theme" value="2">
        <div class="theme-info">
          <div class="theme-name">Forest</div>
          <div class="theme-desc">Teal dial, brown hands</div>
        </div>
        <div class="theme-preview">
          <div class="color-dot" style="background: #005555;"></div>
          <div class="color-dot" style="background: #aa5500;"></div>
        </div>
      </label>
      
      <label class="theme-option">
        <input type="radio" name="theme" value="3">
        <div class="theme-info">
          <div class="theme-name">Pastel</div>
          <div class="theme-desc">Light dial, dark red hands</div>
        </div>
        <div class="theme-preview">
          <div class="color-dot" style="background: #ffffaa;"></div>
          <div class="color-dot" style="background: #550000;"></div>
        </div>
      </label>
      
      <label class="theme-option">
        <input type="radio" name="theme" value="4">
        <div class="theme-info">
          <div class="theme-name">Blue</div>
          <div class="theme-desc">Blue dial, gray hands</div>
        </div>
        <div class="theme-preview">
          <div class="color-dot" style="background: #0000aa;"></div>
          <div class="color-dot" style="background: #aaaaaa;"></div>
        </div>
      </label>
      
      <label class="theme-option">
        <input type="radio" name="theme" value="5">
        <div class="theme-info">
          <div class="theme-name">Rose</div>
          <div class="theme-desc">Dark red dial, pink hands</div>
        </div>
        <div class="theme-preview">
          <div class="color-dot" style="background: #550000;"></div>
          <div class="color-dot" style="background: #ffaaaa;"></div>
        </div>
      </label>
    </div>
    
    <h2>Options</h2>
    <div class="option-list">
      <label class="option-item">
        <input type="checkbox" id="branding" checked>
        <div class="option-info">
          <div class="option-name">Branding</div>
          <div class="option-desc">Show "P E B B L E" text</div>
        </div>
      </label>
      
      <label class="option-item">
        <input type="checkbox" id="date" checked>
        <div class="option-info">
          <div class="option-name">Date</div>
          <div class="option-desc">Show current date</div>
        </div>
      </label>
      
      <label class="option-item">
        <input type="checkbox" id="seconds">
        <div class="option-info">
          <div class="option-name">Seconds Hand</div>
          <div class="option-desc">Show seconds hand (uses more battery)</div>
        </div>
      </label>
    </div>
    
    <button class="btn-save" onclick="saveConfig()">Save</button>
  </div>

  <script>
    // Load saved settings
    var settings = {
      theme: 0,
      branding: true,
      date: true,
      seconds: false
    };
    
    if (location.hash) {
      var params = location.hash.substring(1).split('&');
      params.forEach(function(param) {
        var parts = param.split('=');
        if (parts.length === 2) {
          var key = parts[0];
          var value = parts[1];
          if (key === 'theme') settings.theme = parseInt(value);
          if (key === 'branding') settings.branding = value === '1';
          if (key === 'date') settings.date = value === '1';
          if (key === 'seconds') settings.seconds = value === '1';
        }
      });
    }
    
    // Initialize UI
    document.querySelectorAll('input[name="theme"]').forEach(function(radio) {
      radio.checked = (parseInt(radio.value) === settings.theme);
    });
    document.getElementById('branding').checked = settings.branding;
    document.getElementById('date').checked = settings.date;
    document.getElementById('seconds').checked = settings.seconds;

    function saveConfig() {
      var selected = document.querySelector('input[name="theme"]:checked');
      var config = {
        Theme: selected ? parseInt(selected.value) : 0,
        ShowBranding: document.getElementById('branding').checked ? 1 : 0,
        ShowDate: document.getElementById('date').checked ? 1 : 0,
        ShowSeconds: document.getElementById('seconds').checked ? 1 : 0
      };
      
      var returnTo = getQueryParam('return_to') || 'pebblejs://close#';
      location.href = returnTo + encodeURIComponent(JSON.stringify(config));
    }

    function getQueryParam(name) {
      var match = RegExp('[?&]' + name + '=([^&]*)').exec(window.location.search);
      return match && decodeURIComponent(match[1].replace(/\+/g, ' '));
    }
  </script>
</body>
</html>
